<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chargenode Tippning – Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/supabaseApi.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">⚙️ Admin</div>
      <div class="small">Hantera resultat</div>
    </div>
  </header>
  <main>
    <div class="card">
      <div class="grid grid-2">
        <div>
          <label>Lösenord</label>
          <input id="pass" type="password" placeholder="ADMIN_PASS" />
        </div>
        <div>
          <label>Omgång</label>
          <select id="roundSelect"></select>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button id="saveBtn">Spara resultat</button>
        <button id="exportLocal" class="secondary">Exportera fixtures.json (fallback)</button>
        <button id="importFixtures" class="secondary">Importera fixtures.json → Supabase</button>
        <a href="leaderboard.html"><button class="secondary">Visa tabell</button></a>
      </div>
      <div class="small">Supabase-läge: ändringar sparas i DB. Demoläge: exportera uppdaterad <code>fixtures.json</code> och ersätt i <code>data/</code>.</div>
      <div id="status" class="small"></div>
    </div>
    <div class="card"><div id="matches"></div></div>
  </main>
  <footer>
    <div style="max-width:1100px;margin:0 auto;padding:0 16px">⬅️ <a href="index.html">Till tippningen</a></div>
  </footer>
  <script src="js/helpers.js"></script>
  <script src="js/config.js"></script>
  <script>
  let FIXTURES = [];
  function requireAuth(){ const p = document.getElementById('pass').value; return p === CONFIG.ADMIN_PASS; }
  function usingSupabase(){ return !!ensureSupabase(); }
  function renderRounds(fixtures){ const sel = document.getElementById('roundSelect'); sel.innerHTML = (fixtures||[]).map(r=>`<option value="${r.round}">Omgång ${r.round} (${r.dates||''})</option>`).join(''); }
  function renderMatches(round){ const cont = document.getElementById('matches'); cont.innerHTML = ''; (round.matches||[]).forEach(m=>{ const row = document.createElement('div'); row.className='match'; const h = (m.result && typeof m.result.home==='number') ? m.result.home : ''; const a = (m.result && typeof m.result.away==='number') ? m.result.away : ''; row.innerHTML = `
        <div class="team">${m.home}</div>
        <div class="small">vs</div>
        <div class="team">${m.away}</div>
        <input type="number" min="0" step="1" inputmode="numeric" placeholder="H" data-type="home" data-id="${m.id}" value="${h}" />
        <input type="number" min="0" step="1" inputmode="numeric" placeholder="B" data-type="away" data-id="${m.id}" value="${a}" />
      `; cont.appendChild(row); }); }
<script>
async function notifySlackResults(roundNo) {
  if (!CONFIG.SLACK_WEBHOOK) return;

  await fetch(CONFIG.SLACK_WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      text: `⚽ Resultat inlagt för Omgång ${roundNo}\n👉 Se tabellen: https://fredrikkrebs.github.io/chargenode-tipster/leaderboard.html`
    })
  });
}
</script>
``
  </script>
</body>
</html>
