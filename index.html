<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chargenode Tippning</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/supabaseApi.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">⚡ Chargenode Tippning</div>
      <div class="small">Säsong 2026 • Anpassad för internt bruk</div>
    </div>
  </header>
  <main>
    <div class="card">
      <div class="grid grid-2">
        <div>
          <label>Ditt namn/alias</label>
          <input id="playerName" type="text" placeholder="t.ex. Fredrik K" />
        </div>
        <div>
          <label>Omgång</label>
          <select id="roundSelect"></select>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button id="saveBtn">Spara tips</button>
        <a href="leaderboard.html" class="button-link"><button class="secondary">Visa tabell</button></a>
      </div>
      <p class="small">Poängregler: <strong>Exakt resultat = 3p</strong>, rätt tecken (1X2) = 1p.</p>
      <div id="status" class="small"></div>
    </div>

    <div class="card">
      <div id="matches"></div>
    </div>

    <div class="card notice">
      <strong>Tips:</strong> Om Supabase är konfigurerat sparas tips i molnet. Annars sparas tips lokalt i din webbläsare.
    </div>
  </main>
  <footer>
    Byggd av M365 Copilot · ⚙️ <a href="admin.html">Admin</a>
  </footer>
  <script src="js/helpers.js"></script>
  <script src="js/config.js"></script>
  <script>
  let FIXTURES = [];
  let PICKS_LOCAL_KEY = 'chargenode_picks_v1';

  function usingSupabase(){ return !!ensureSupabase(); }

  function getLocalPicks(){
    try{ return JSON.parse(localStorage.getItem(PICKS_LOCAL_KEY)||'{}'); }catch(e){return {}};
  }
  function setLocalPicks(p){ localStorage.setItem(PICKS_LOCAL_KEY, JSON.stringify(p)); }

  function renderRounds(fixtures){
    const sel = document.getElementById('roundSelect');
    sel.innerHTML = fixtures.map(r=>`<option value="${r.round}">Omgång ${r.round} (${r.dates||''})</option>`).join('');
  }
  function renderMatches(round){
    const cont = document.getElementById('matches');
    cont.innerHTML = '';
    (round.matches||[]).forEach(m=>{
      const row = document.createElement('div');
      row.className='match';
      row.innerHTML = `
        <div class="team">${m.home}</div>
        <div class="small">vs</div>
        <div class="team">${m.away}</div>
        <input type="number" min="0" step="1" inputmode="numeric" placeholder="H" data-type="home" data-id="${m.id}" />
        <input type="number" min="0" step="1" inputmode="numeric" placeholder="B" data-type="away" data-id="${m.id}" />
      `;
      cont.appendChild(row);
    });
  }
  function loadExistingPicksIntoUI(round){
    if(usingSupabase()) return; // i Cloud-läget skippar vi auto-fill (kan läggas till senare)
    const name = document.getElementById('playerName').value.trim();
    const picks = getLocalPicks();
    if(!name || !picks[name]) return;
    const byMatch = picks[name];
    document.querySelectorAll('input[data-id]').forEach(inp=>{
      const id = inp.getAttribute('data-id');
      const t = inp.getAttribute('data-type');
      if(byMatch[id] && typeof byMatch[id][t]==='number') inp.value = byMatch[id][t];
    });
  }

  async function init(){
    try{
      if(usingSupabase()){
        FIXTURES = await sbLoadFixtures();
      }else{
        FIXTURES = await fetchJSON('data/fixtures.json');
      }
    }catch(e){
      console.error(e);
      FIXTURES = await fetchJSON('data/fixtures.json');
    }
    renderRounds(FIXTURES);
    const sel = document.getElementById('roundSelect');
    renderMatches(FIXTURES[0]||{matches:[]});
    sel.addEventListener('change', ()=>{
      const rr = FIXTURES.find(r=>r.round == sel.value);
      renderMatches(rr||{matches:[]});
      loadExistingPicksIntoUI(rr);
    });
    document.getElementById('saveBtn').addEventListener('click', savePicks);
  }

  async function savePicks(){
    const status = document.getElementById('status');
    const name = document.getElementById('playerName').value.trim();
    if(!name){ status.innerHTML = '<span class="error">Fyll i namn innan du sparar.</span>'; return; }

    if(usingSupabase()){
      try{
        const playerId = await sbEnsurePlayer(name);
        const r = await sbSavePicks(playerId);
        status.textContent = `Sparat till molnet! (${r.inserted} matcher)`;
      }catch(e){ console.error(e); status.innerHTML = '<span class="error">Kunde inte spara till molnet.</span>'; }
      return;
    }

    // Lokal fallback
    const inputs = [...document.querySelectorAll('input[data-id]')];
    const roundPicks = {};
    for(const inp of inputs){
      const id = inp.getAttribute('data-id');
      const t = inp.getAttribute('data-type');
      const v = inp.value === '' ? null : Number(inp.value);
      if(!roundPicks[id]) roundPicks[id] = {home:null,away:null};
      roundPicks[id][t] = v;
    }
    const all = getLocalPicks();
    all[name] = {...(all[name]||{}), ...roundPicks};
    setLocalPicks(all);
    status.textContent = 'Sparat! (Lokalt)';
  }

  init();
  </script>
</body>
</html>
